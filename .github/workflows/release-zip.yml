name: Release Integration Zip

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bundle_alphaess_modbus:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Create alphaess_modbus zip
        run: |
          cd custom_components
          zip -r ../alphaess_modbus-${{ github.event.release.tag_name || 'manual' }}.zip alphaess_modbus

      - name: Upload zip to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: alphaess_modbus-${{ github.event.release.tag_name || 'manual' }}.zip
