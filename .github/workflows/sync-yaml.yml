name: Sync integration_alpha_ess.yaml

on:
  schedule:
    # Every day at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch: # allow manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Download latest YAML from Axel's site
        run: |
          curl -fsSL \
            "https://projects.hillviewlodge.ie/_alphaess/integration_alpha_ess.yaml" \
            -o /tmp/integration_alpha_ess.yaml

      - name: Check for differences
        id: diff
        run: |
          if diff -q \
            custom_components/alphaess_modbus/integration_alpha_ess.yaml \
            /tmp/integration_alpha_ess.yaml > /dev/null 2>&1; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            cp /tmp/integration_alpha_ess.yaml \
              custom_components/alphaess_modbus/integration_alpha_ess.yaml
          fi

      - name: Regenerate modern automation package
        if: steps.diff.outputs.changed == 'true'
        run: |
          python scripts/generate_modern_automations_package.py

      - name: Create Pull Request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: update integration_alpha_ess.yaml from upstream"
          title: "Update integration_alpha_ess.yaml from upstream"
          body: |
            Automated update — a new version of `integration_alpha_ess.yaml` was
            detected at https://projects.hillviewlodge.ie/_alphaess/integration_alpha_ess.yaml

            This PR also regenerates `automations_modern.yaml` so modern
            service-based automations stay in sync with upstream updates.

            Please review the diff to confirm the new registers / changes are
            compatible before merging.
          branch: auto/sync-yaml
          labels: dependencies
          delete-branch: true
