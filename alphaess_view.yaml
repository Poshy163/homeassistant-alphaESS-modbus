              - entity: sensor.alphaess_ovp10
                name: OvP10
              - entity: sensor.alphaess_ovp10_time
                name: OvP10 Time
              - type: section
              - entity: sensor.alphaess_uvp_l1
                name: Undervoltage Protection L1
              - entity: sensor.alphaess_uvp_l1_time
                name: UvP L1 Time
              - entity: sensor.alphaess_uvp_l2
                name: UvP L2
              - entity: sensor.alphaess_uvp_l2_time
                name: UvP L2 Time
              - entity: sensor.alphaess_uvp_l3
                name: UvP L3
              - entity: sensor.alphaess_uvp_l3_time
                name: UvP L3 Time
            title: Voltage Protection
      - type: grid
        cards:
          - type: entities
            entities:
              - entity: sensor.alphaess_ofp_l1
                name: Overfrequency Protection L1
              - entity: sensor.alphaess_ofp_l1_time
                name: OfP L1 Time
              - entity: sensor.alphaess_ofp_l2
                name: OfP L2
              - entity: sensor.alphaess_ofp_l2_time
                name: OfP L2 Time
              - entity: sensor.alphaess_ofp_l3
                name: OfP L3
              - entity: sensor.alphaess_ofp_l3_time
                name: OfP L3 Time
              - type: section
              - entity: sensor.alphaess_ufp_l1
                name: Underfrequency Protection L1
              - entity: sensor.alphaess_ufp_l1_time
                name: UfP L1 Time
              - entity: sensor.alphaess_ufp_l2
                name: UfP L2
              - entity: sensor.alphaess_ufp_l2_time
                name: UfP L2 Time
              - entity: sensor.alphaess_ufp_l3
                name: UfP L3
              - entity: sensor.alphaess_ufp_l3_time
                name: UfP L3 Time
            title: Frequency Protection

  # ── Warnings & Faults ────────────────────────────────────────
  - path: warnings-faults
