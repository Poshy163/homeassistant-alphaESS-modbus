          - switch.alphaess_helper_force_charging
          - input_boolean.alphaess_helper_force_charging
        to: "on"
    actions:
      - action: alphaess_modbus.force_charge
        data:
          power_kw: >-
            {% set n = states('number.alphaess_template_force_charging_power') %}
            {{ n|float(5) if n not in ['unknown','unavailable','none',''] else 5 }}
          duration_min: >-
