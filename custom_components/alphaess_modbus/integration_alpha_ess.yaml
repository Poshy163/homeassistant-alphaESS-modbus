#################################################################################################################################

# Modbus sensor configuration
modbus:
  - name: modbuspvsystem
    type: tcp
    host: !secret alphaess_modbus_host_ip
    port: !secret alphaess_modbus_host_port
    message_wait_milliseconds: 10 # Waittime between 2 messages
    timeout: 10                   # Timeout in seconds before connection is closed
    delay: 1                      # Delay in seconds at startup

# Definition of sensors
    sensors:
# Measurements other
      - name: AlphaESS Inverter Grid Frequency
        unique_id: AlphaESS_Inverter_Grid_Frequency
        slave: !secret alphaess_modbus_slaveId
        address: 0x041C
        data_type: int16
        unit_of_measurement: Hz
        device_class: frequency
        state_class: measurement
        scan_interval: 30
        scale: 0.01
        precision: 2                         

      - name: AlphaESS Inverter Temperature 
        unique_id: AlphaESS_Inverter_Temperature
        slave: !secret alphaess_modbus_slaveId
        address: 0x0435
        data_type: int16
        unit_of_measurement: °C
        device_class: temperature
        state_class: measurement
        scan_interval: 60
        scale: 0.1 # 0.01 for SMILE-B3/SMILE-B3-PLUS
        precision: 0

      - name: AlphaESS Inverter Work Mode
        unique_id: AlphaESS_Inverter_Work_Mode
        slave: !secret alphaess_modbus_slaveId
        address: 0x0440
        data_type: int16
        state_class: measurement
        scan_interval: 5
        
      - name: AlphaESS BMS Version
        unique_id: AlphaESS_BMS_Version
        slave: !secret alphaess_modbus_slaveId
        address: 0x0115
        data_type: int16
        state_class: measurement
        scan_interval: 60
        
      - name: AlphaESS LMU Version
        unique_id: AlphaESS_LMU_Version
        slave: !secret alphaess_modbus_slaveId
        address: 0x0116
        data_type: int16
        state_class: measurement
        scan_interval: 60
        
      - name: AlphaESS ISO Version
        unique_id: AlphaESS_ISO_Version
        slave: !secret alphaess_modbus_slaveId
        address: 0x0117
        data_type: int16
        state_class: measurement
        scan_interval: 60

      - name: AlphaESS Inverter Version
        unique_id: AlphaESS_Inverter_Version
        slave: !secret alphaess_modbus_slaveId
        address: 0x0640
        data_type: string
        count: 5
        scan_interval: 60
        
      - name: AlphaESS Inverter ARM Version
        unique_id: AlphaESS_Inverter_ARM_Version
        slave: !secret alphaess_modbus_slaveId
        address: 0x0645
        data_type: string
        count: 5
        scan_interval: 60
       
      - name: AlphaESS EMS Version High
        unique_id: AlphaESS_EMS_Version_High
        slave: !secret alphaess_modbus_slaveId
        address: 0x074B
        data_type: int16
        state_class: measurement
        scan_interval: 60

      - name: AlphaESS EMS Version Middle
        unique_id: AlphaESS_EMS_Version_Middle
        slave: !secret alphaess_modbus_slaveId
        address: 0x074C
        data_type: int16
        state_class: measurement
        scan_interval: 60

      - name: AlphaESS EMS Version Low
        unique_id: AlphaESS_EMS_Version_Low
        slave: !secret alphaess_modbus_slaveId
        address: 0x074D
        data_type: int16
        state_class: measurement
        scan_interval: 60

      - name: AlphaESS System Time YYMM
        unique_id: AlphaESS_System_Time_YYMM
        slave: !secret alphaess_modbus_slaveId
        address: 0x0740
        data_type: int16
        state_class: measurement
        scan_interval: 5
        
      - name: AlphaESS System Time DDHH
        unique_id: AlphaESS_System_Time_DDHH
        slave: !secret alphaess_modbus_slaveId
        address: 0x0741
        data_type: int16
        state_class: measurement
        scan_interval: 5

      - name: AlphaESS System Time MMSS
        unique_id: AlphaESS_System_Time_MMSS
        slave: !secret alphaess_modbus_slaveId
        address: 0x0742
        data_type: int16
        state_class: measurement
        scan_interval: 5

      # Modbus Baud Rate 0 = 9600/1 = 115200/2 = 256000/3 = 19200
      - name: AlphaESS Modbus Baud Rate
        unique_id: AlphaESS_Modbus_Baud_Rate
        slave: !secret alphaess_modbus_slaveId
        address: 0x0810
        data_type: uint16
        state_class: measurement
        scan_interval: 60
        scale: 1

      # IP Method 0 = DHCP/1 = Static
      - name: AlphaESS IP Method
        unique_id: AlphaESS_IP_Method
        slave: !secret alphaess_modbus_slaveId
        address: 0x0808
        data_type: uint16
        state_class: measurement
        scan_interval: 60
        scale: 1

      - name: AlphaESS Local IP
        unique_id: AlphaESS_Local_IP
        slave: !secret alphaess_modbus_slaveId
        address: 0x0809
        data_type: uint32
        state_class: measurement
        scan_interval: 60
        scale: 1

      - name: AlphaESS Subnet Mask
        unique_id: AlphaESS_Subnet_Mask
        slave: !secret alphaess_modbus_slaveId
        address: 0x080B
        data_type: uint32
        state_class: measurement
        scan_interval: 60
        scale: 1

      - name: AlphaESS Gateway
        unique_id: AlphaESS_Gateway
        slave: !secret alphaess_modbus_slaveId
        address: 0x080D
        data_type: uint32
        state_class: measurement
        scan_interval: 60
        scale: 1

# Measurements current power
      # Power to/from GRID
      - name: AlphaESS Power Grid
        unique_id: AlphaESS_Power_Grid
        slave: !secret alphaess_modbus_slaveId
        address: 0x0021
        data_type: int32
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        scan_interval: 1

      - name: AlphaESS Power Phase A Grid
        unique_id: AlphaESS_Power_Phase_A_Grid
        slave: !secret alphaess_modbus_slaveId
        address: 0x001B
        data_type: int32
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        scan_interval: 5

      - name: AlphaESS Power Phase B Grid
        unique_id: AlphaESS_Power_Phase_B_Grid
        slave: !secret alphaess_modbus_slaveId
        address: 0x001D
        data_type: int32
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        scan_interval: 5

      - name: AlphaESS Power Phase C Grid
        unique_id: AlphaESS_Power_Phase_C_Grid
        slave: !secret alphaess_modbus_slaveId
        address: 0x001F
        data_type: int32
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        scan_interval: 5

      - name: AlphaESS Voltage Phase A Grid
        unique_id: AlphaESS_Voltage_Phase_A_Grid
        slave: !secret alphaess_modbus_slaveId
        address: 0x0014
        data_type: int16
        unit_of_measurement: V
        device_class: voltage
        state_class: measurement
        scan_interval: 5
        scale: 1 # 0.1 for SMILE-B3/SMILE-B3-PLUS

      - name: AlphaESS Voltage Phase B Grid
        unique_id: AlphaESS_Voltage_Phase_B_Grid
        slave: !secret alphaess_modbus_slaveId
        address: 0x0015
        data_type: int16
        unit_of_measurement: V
        device_class: voltage
        state_class: measurement
        scan_interval: 5
        scale: 1 # 0.1 for SMILE-B3/SMILE-B3-PLUS

      - name: AlphaESS Voltage Phase C Grid
        unique_id: AlphaESS_Voltage_Phase_C_Grid
        slave: !secret alphaess_modbus_slaveId
        address: 0x0016
        data_type: int16
        unit_of_measurement: V
        device_class: voltage
        state_class: measurement
        scan_interval: 5
        scale: 1 # 0.1 for SMILE-B3/SMILE-B3-PLUS

      # Power to/from Battery
      - name: AlphaESS Power Battery
        unique_id: AlphaESS_Power_Battery
        slave: !secret alphaess_modbus_slaveId
        address: 0x0126
        data_type: int16
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        scan_interval: 1

      # Power Inverter L1
      - name: AlphaESS Power Inverter L1
        unique_id: AlphaESS_Power_Inverter_L1
        slave: !secret alphaess_modbus_slaveId
        address: 0x0406
        data_type: int32
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        scan_interval: 5
        scale: 1 # 0.1 for SMILE-B3/SMILE-B3-PLUS

      # Power Inverter L2
      - name: AlphaESS Power Inverter L2
        unique_id: AlphaESS_Power_Inverter_L2
        slave: !secret alphaess_modbus_slaveId
        address: 0x0408
        data_type: int32
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        scan_interval: 5
        scale: 1 # 0.1 for SMILE-B3/SMILE-B3-PLUS

      # Power Inverter L3
      - name: AlphaESS Power Inverter L3
        unique_id: AlphaESS_Power_Inverter_L3
        slave: !secret alphaess_modbus_slaveId
        address: 0x040A
        data_type: int32
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        scan_interval: 5
        scale: 1 # 0.1 for SMILE-B3/SMILE-B3-PLUS

      # Power Inverter
      - name: AlphaESS Power Inverter
        unique_id: AlphaESS_Power_Inverter
        slave: !secret alphaess_modbus_slaveId
        address: 0x040C
        data_type: int32
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        scan_interval: 5
        scale: 1 # 0.1 for SMILE-B3/SMILE-B3-PLUS

      # Backup Power Inverter L1
      - name: AlphaESS Backup Power Inverter L1
        unique_id: AlphaESS_Backup_Power_Inverter_L1
        slave: !secret alphaess_modbus_slaveId
        address: 0x0414
        data_type: int32
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        scan_interval: 5
        scale: 1 # 0.1 for SMILE-B3/SMILE-B3-PLUS

      # Backup Power Inverter L2
      - name: AlphaESS  Backup Power Inverter L2
        unique_id: AlphaESS_Backup_Power_Inverter_L2
        slave: !secret alphaess_modbus_slaveId
        address: 0x0416
        data_type: int32
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        scan_interval: 5
        scale: 1 # 0.1 for SMILE-B3/SMILE-B3-PLUS

      # Backup Power Inverter L3
      - name: AlphaESS Backup Power Inverter L3
        unique_id: AlphaESS_Backup_Power_Inverter_L3
        slave: !secret alphaess_modbus_slaveId
        address: 0x0418
        data_type: int32
        unit_of_measurement: W
        device_class: power
