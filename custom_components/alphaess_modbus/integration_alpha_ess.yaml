# --- Start Force Charging automations
# Set Force Charging
  - id: "AlphaESS_Force_Charging"
    alias: AlphaESS Force Charging
    triggers:
      - trigger: state
        entity_id:
          - input_boolean.alphaess_helper_force_charging
        to: "on"
    actions:
      - if:
          - condition: or
            conditions:
              - condition: state
                entity_id: input_boolean.alphaess_helper_force_charging
                state: "on"
                enabled: false
              - condition: state
                entity_id: input_boolean.alphaess_helper_force_discharging
                state: "on"
              - condition: state
                entity_id: input_boolean.alphaess_helper_force_export
                state: "on"
              - condition: state
                entity_id: input_boolean.alphaess_helper_dispatch
                state: "on"
              - condition: state
                entity_id: input_boolean.alphaess_helper_excess_export
                state: "on"
        then:
          - entity_id: input_boolean.alphaess_helper_force_charging
            action: input_boolean.turn_off
            enabled: false
          - entity_id: input_boolean.alphaess_helper_force_discharging
            action: input_boolean.turn_off
          - entity_id: input_boolean.alphaess_helper_force_export
            action: input_boolean.turn_off
          - entity_id: input_boolean.alphaess_helper_dispatch
            action: input_boolean.turn_off
          - entity_id: input_boolean.alphaess_helper_excess_export
            action: input_boolean.turn_off
          - if:
              - condition: state
                entity_id: input_boolean.alphaess_helper_excess_export
                state: "off"
            then:
              - action: input_boolean.turn_off
                target:
                  entity_id: input_boolean.alphaess_helper_excess_export_pause
                data: {}
          - data:
              entity_id: timer.alphaess_helper_force_charging_timer
            action: timer.cancel
          - data:
              entity_id: timer.alphaess_helper_force_discharging_timer
            action: timer.cancel
          - data:
              entity_id: timer.alphaess_helper_force_export_timer
            action: timer.cancel
          - data:
              entity_id: timer.alphaess_helper_dispatch_timer
            action: timer.cancel
          - delay:
              seconds: 2
      - action: modbus.write_register
        data:
          hub: modbuspvsystem
          address: 0x0880 # Dispatch Starting Register
          slave: !secret alphaess_modbus_slaveId
          value:
            - 1   # Dispatch Start
            - 0   # Dispatch Active Power, 32000 Offset (2 bytes/registers)
            - "{{ 32000 - ((states('input_number.alphaess_helper_force_charging_power')|float * 1000)|int) }}"
            - 0   # Dispatch Reactive Power, 32000 Offset (2 bytes/registers)
            - 32000
            - 2   # Dispatch Mode (2 = State of Charge Control)
            - "{{ (states('input_number.alphaess_helper_force_charging_cutoff_soc')|int / 0.392) |int }}"
            - 0   # Dispatch Time (2 bytes/registers)
            - "{{ (states('input_number.alphaess_helper_force_charging_duration')|int) * 60 }}"
      - action: timer.start
        data:
          entity_id: timer.alphaess_helper_force_charging_timer
          duration: "{{ (states('input_number.alphaess_helper_force_charging_duration')|int) * 60 }}"
    mode: single

# Update Force Charging Cutoff SoC
