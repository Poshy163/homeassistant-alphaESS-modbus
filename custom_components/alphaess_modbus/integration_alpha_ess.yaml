        step: 0.1
        min: "{{ -(states('input_select.alphaess_helper_inverter_ac_limit').replace(' kW','')|float ) }}"
        max: "{{ (states('input_select.alphaess_helper_inverter_ac_limit').replace(' kW','')|float ) }}"
        availability: "{{ (states('input_select.alphaess_helper_inverter_ac_limit').replace(' kW','')|float ) | is_number }}"

#-------------------------------------------------------------------------------------------------------------------------------#
