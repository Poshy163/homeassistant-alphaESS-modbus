          duration: "{{ (states('input_number.alphaess_helper_force_discharging_duration')|int) * 60 }}"
    mode: single

# Update Force Discharging Power
  - id: "AlphaESS_Update_Force_Discharging_Power"
    alias: AlphaESS Update Force Discharging Power
    triggers:
      - trigger: state
        entity_id:
          - input_number.alphaess_helper_force_discharging_power
    conditions:
      - condition: state
        entity_id: input_boolean.alphaess_helper_force_discharging
        state: "on"
    actions:
      - action: modbus.write_register
        data:
          hub: modbuspvsystem
          address: 0x0881 # Dispatch Active Power, 32000 Offset
          slave: !secret alphaess_modbus_slaveId
          value:
            - 0
            - "{{ 32000 + ((states('input_number.alphaess_helper_force_discharging_power')|float * 1000)|int) }}"
    mode: single
# --- End Force Disharging automations

# --- Start Force Export automations
# Set Force Export
  - id: "AlphaESS_Force_Export"
    alias: AlphaESS Force Export
    triggers:
      - trigger: state
        entity_id:
          - sensor.alphaess_current_house_load
    conditions:
      - condition: state
        entity_id: input_boolean.alphaess_helper_force_export
        state: "on"
      - condition: template
        value_template: >-
          {{now() >
          state_attr('automation.alphaess_force_export','last_triggered') | default(as_datetime(0), true)
          + timedelta(seconds=5)}}
    actions:
      - if:
          - condition: or
            conditions:
              - condition: state
                entity_id: input_boolean.alphaess_helper_force_charging
                state: "on"
              - condition: state
                entity_id: input_boolean.alphaess_helper_force_discharging
                state: "on"
              - condition: state
                entity_id: input_boolean.alphaess_helper_force_export
                state: "on"
                enabled: false
              - condition: state
                entity_id: input_boolean.alphaess_helper_dispatch
                state: "on"
              - condition: state
                entity_id: input_boolean.alphaess_helper_excess_export
                state: "on"
        then:
          - entity_id: input_boolean.alphaess_helper_force_charging
            action: input_boolean.turn_off
          - entity_id: input_boolean.alphaess_helper_force_discharging
            action: input_boolean.turn_off
          - entity_id: input_boolean.alphaess_helper_force_export
            action: input_boolean.turn_off
            enabled: false
          - entity_id: input_boolean.alphaess_helper_dispatch
            action: input_boolean.turn_off
          - entity_id: input_boolean.alphaess_helper_excess_export
            action: input_boolean.turn_off
          - if:
              - condition: state
                entity_id: input_boolean.alphaess_helper_excess_export
                state: "off"
            then:
              - action: input_boolean.turn_off
                target:
                  entity_id: input_boolean.alphaess_helper_excess_export_pause
                data: {}
          - data:
              entity_id: timer.alphaess_helper_force_charging_timer
            action: timer.cancel
          - data:
              entity_id: timer.alphaess_helper_force_discharging_timer
            action: timer.cancel
          - data:
              entity_id: timer.alphaess_helper_force_export_timer
            action: timer.cancel
          - data:
              entity_id: timer.alphaess_helper_dispatch_timer
            action: timer.cancel
          - delay:
              seconds: 2
      - action: modbus.write_register
        data:
          hub: modbuspvsystem
          address: 0x0880 # Dispatch Starting Register
          slave: !secret alphaess_modbus_slaveId
          value:
            - 1   # Dispatch Start
            - 0   # Dispatch Active Power, 32000 Offset (2 bytes/registers)
            - "{{ 32000 + (states('sensor.alphaess_current_house_load')|int + (states('input_number.alphaess_helper_force_export_power')|float * 1000)|int) - states('sensor.alphaess_current_pv_production')|int }}"
            - 0   # Dispatch Reactive Power, 32000 Offset (2 bytes/registers)
            - 32000
            - 2   # Dispatch Mode (2 = State of Charge Control)
            - >
              {% if (states('sensor.alphaess_current_house_load')|int + (states('input_number.alphaess_helper_force_export_power')|float * 1000)|int) - states('sensor.alphaess_current_pv_production')|int > 0 %}
                {{ (states('input_number.alphaess_helper_force_export_cutoff_soc')|int / 0.392) |int }}
              {% else %}
                255
              {% endif %}
            - 0   # Dispatch Time (2 bytes/registers)
            - "{{ (states('input_number.alphaess_helper_force_export_duration')|int) * 60 }}"
      - if:
          - condition: state
            entity_id: timer.alphaess_helper_force_export_timer
            state:
              - idle
        then:
          - action: timer.start
            data:
              entity_id: timer.alphaess_helper_force_export_timer
              duration: "{{ (states('input_number.alphaess_helper_force_export_duration')|int) * 60 }}"
    mode: single
    max_exceeded: silent

# Update Force Export Cutoff SoC
  - id: "AlphaESS_Update_Force_Export_Cutoff_SoC"
    alias: AlphaESS Update Force Export Cutoff SoC
    triggers:
      - trigger: state
        entity_id:
          - input_number.alphaess_helper_force_export_cutoff_soc
    conditions:
      - condition: state
        entity_id: input_boolean.alphaess_helper_force_export
        state: "on"
    actions:
      - action: modbus.write_register
        data:
          hub: modbuspvsystem
          address: 0x0886 # Dispatch SoC (0.392%/bit)
          slave: !secret alphaess_modbus_slaveId
          value:
            - "{{ (states('input_number.alphaess_helper_force_export_cutoff_soc')|int / 0.392) |int }}"
    mode: single

# Update Force Export Duration
  - id: "AlphaESS_Update_Force_Export_Duration"
    alias: AlphaESS Update Force Export Duration
    triggers:
      - trigger: state
        entity_id:
          - input_number.alphaess_helper_force_export_duration
    conditions:
      - condition: state
        entity_id: input_boolean.alphaess_helper_force_export
        state: "on"
    actions:
      - action: modbus.write_register
        data:
          hub: modbuspvsystem
          address: 0x0887 # Dispatch Time
          slave: !secret alphaess_modbus_slaveId
          value:
            - 0
            - "{{ (states('input_number.alphaess_helper_force_export_duration')|int) * 60 }}"
      - action: timer.cancel
        data:
          entity_id: timer.alphaess_helper_force_export_timer
      - action: timer.start
        data:
          entity_id: timer.alphaess_helper_force_export_timer
          duration: "{{ (states('input_number.alphaess_helper_force_export_duration')|int) * 60 }}"
    mode: single

# Update Force Export Power
  - id: "AlphaESS_Update_Force_Export_Power"
    alias: AlphaESS Update Force Export Power
    triggers:
      - trigger: state
        entity_id:
          - input_number.alphaess_helper_force_export_power
    conditions:
      - condition: state
        entity_id: input_boolean.alphaess_helper_force_export
        state: "on"
    actions:
      - action: modbus.write_register
        data:
          hub: modbuspvsystem
          address: 0x0881 # Dispatch Active Power, 32000 Offset
          slave: !secret alphaess_modbus_slaveId
          value:
            - 0
            - "{{ 32000 + ((states('input_number.alphaess_helper_force_export_power')|float * 1000)|int) }}"
    mode: single
# --- Start Force Export automations

# --- Start Dispatch automations
# Set Dispatch
  - id: "AlphaESS_Dispatch"
    alias: AlphaESS Dispatch
    triggers:
      - trigger: state
        entity_id:
          - input_boolean.alphaess_helper_dispatch
        to: "on"
    actions:
      - if:
          - condition: or
            conditions:
              - condition: state
                entity_id: input_boolean.alphaess_helper_force_charging
                state: "on"
              - condition: state
                entity_id: input_boolean.alphaess_helper_force_discharging
                state: "on"
              - condition: state
                entity_id: input_boolean.alphaess_helper_force_export
                state: "on"
              - condition: state
                entity_id: input_boolean.alphaess_helper_dispatch
                enabled: false
                state: "on"
              - condition: state
                entity_id: input_boolean.alphaess_helper_excess_export
                state: "on"
        then:
          - entity_id: input_boolean.alphaess_helper_force_charging
            action: input_boolean.turn_off
          - entity_id: input_boolean.alphaess_helper_force_discharging
            action: input_boolean.turn_off
          - entity_id: input_boolean.alphaess_helper_force_export
            action: input_boolean.turn_off
          - entity_id: input_boolean.alphaess_helper_dispatch
            action: input_boolean.turn_off
            enabled: false
          - entity_id: input_boolean.alphaess_helper_excess_export
            action: input_boolean.turn_off
          - if:
              - condition: state
                entity_id: input_boolean.alphaess_helper_excess_export
                state: "off"
            then:
              - action: input_boolean.turn_off
                target:
                  entity_id: input_boolean.alphaess_helper_excess_export_pause
                data: {}
          - data:
              entity_id: timer.alphaess_helper_force_charging_timer
            action: timer.cancel
          - data:
              entity_id: timer.alphaess_helper_force_discharging_timer
            action: timer.cancel
          - data:
              entity_id: timer.alphaess_helper_force_export_timer
            action: timer.cancel
          - data:
              entity_id: timer.alphaess_helper_dispatch_timer
            action: timer.cancel
          - delay:
              seconds: 2
      - action: modbus.write_register
        data:
          hub: modbuspvsystem
          address: 0x0880 # Dispatch Starting Register
          slave: !secret alphaess_modbus_slaveId
          value:
            - 1   # Dispatch Start
            - 0   # Dispatch Active Power, 32000 Offset (2 bytes/registers)
            - >
              {% set dispatch_mode = states('input_select.alphaess_helper_dispatch_mode').split('(')[1].split(')')[0] %}
              {% if dispatch_mode == "1" or dispatch_mode == "2" or dispatch_mode == "3" or dispatch_mode == "5" %}
                {{ 32000 + ((states('input_number.alphaess_helper_dispatch_power')|float * 1000)|int) }}
              {% else %}
                32000
              {% endif %}
            - 0   # Dispatch Reactive Power, 32000 Offset (2 bytes/registers)
            - 32000
            - "{{ states('input_select.alphaess_helper_dispatch_mode').split('(')[1].split(')')[0] }}"
            - >
              {% set dispatch_mode = states('input_select.alphaess_helper_dispatch_mode').split('(')[1].split(')')[0] %}
              {% if dispatch_mode == "2" %}
                {{ (states('input_number.alphaess_helper_dispatch_cutoff_soc')|int / 0.392) |int }}
              {% else %}
                0
              {% endif %}
            - 0   # Dispatch Time (2 bytes/registers)
            - "{{ (states('input_number.alphaess_helper_dispatch_duration')|int) * 60 }}"
      - action: timer.start
        data:
          entity_id: timer.alphaess_helper_dispatch_timer
          duration: "{{ (states('input_number.alphaess_helper_dispatch_duration')|int) * 60 }}"
    mode: single

# Update Dispatch Mode
  - id: "AlphaESS_Update_Dispatch_Mode"
    alias: AlphaESS Update Dispatch Mode
    triggers:
      - trigger: state
        entity_id:
          - input_select.alphaess_helper_dispatch_mode
    conditions:
      - condition: state
        entity_id: input_boolean.alphaess_helper_dispatch
        state: "on"
    actions:
      - action: modbus.write_register
        data:
          hub: modbuspvsystem
          address: 0x0880 # Dispatch Starting Register
          slave: !secret alphaess_modbus_slaveId
          value:
            - 0   # Dispatch Start
            - 0   # Dispatch Active Power, 32000 Offset (2 bytes/registers)
            - 32000
            - 0   # Dispatch Reactive Power, 32000 Offset (2 bytes/registers)
            - 32000
            - 0   # Dispatch Mode (2 = State of Charge Control)
            - 0   # Dispatch SOC  (0.392%/bit)
            - 0   # Dispatch Time (2 bytes/registers)
            - 90
      - action: timer.cancel
        data:
          entity_id: timer.alphaess_helper_dispatch_timer
      - delay:
          seconds: 2
      - action: modbus.write_register
        data:
          hub: modbuspvsystem
          address: 0x0880 # Dispatch Starting Register
          slave: !secret alphaess_modbus_slaveId
          value:
            - 1   # Dispatch Start
            - 0   # Dispatch Active Power, 32000 Offset (2 bytes/registers)
            - >
              {% set dispatch_mode = states('input_select.alphaess_helper_dispatch_mode').split('(')[1].split(')')[0] %}
              {% if dispatch_mode == "1" or dispatch_mode == "2" or dispatch_mode == "3" or dispatch_mode == "5" %}
                {{ 32000 + ((states('input_number.alphaess_helper_dispatch_power')|float * 1000)|int) }}
              {% else %}
                32000
              {% endif %}
            - 0   # Dispatch Reactive Power, 32000 Offset (2 bytes/registers)
            - 32000
            - "{{ states('input_select.alphaess_helper_dispatch_mode').split('(')[1].split(')')[0] }}"
            - >
              {% set dispatch_mode = states('input_select.alphaess_helper_dispatch_mode').split('(')[1].split(')')[0] %}
              {% if dispatch_mode == "2" %}
                {{ (states('input_number.alphaess_helper_dispatch_cutoff_soc')|int / 0.392) |int }}
              {% else %}
                0
              {% endif %}
            - 0   # Dispatch Time (2 bytes/registers)
            - "{{ (states('input_number.alphaess_helper_dispatch_duration')|int) * 60 }}"
      - action: timer.start
        data:
          entity_id: timer.alphaess_helper_dispatch_timer
          duration: "{{ (states('input_number.alphaess_helper_dispatch_duration')|int) * 60 }}"
    mode: single

# Update Dispatch Cutoff SoC
  - id: "AlphaESS_Update_Dispatch_Cutoff_SoC"
    alias: AlphaESS Update Dispatch Cutoff SoC
    triggers:
      - trigger: state
        entity_id:
          - input_number.alphaess_helper_dispatch_cutoff_soc
    conditions:
      - condition: state
        entity_id: input_boolean.alphaess_helper_dispatch
        state: "on"
      - condition: state
        entity_id: input_select.alphaess_helper_dispatch_mode
        state: "State of Charge Control (2)"
    actions:
      - action: modbus.write_register
        data:
          hub: modbuspvsystem
          address: 0x0886 # Dispatch SoC (0.392%/bit)
          slave: !secret alphaess_modbus_slaveId
          value:
            - "{{ (states('input_number.alphaess_helper_dispatch_cutoff_soc')|int / 0.392) |int }}"
    mode: single

# Update Dispatch Duration
  - id: "AlphaESS_Update_Dispatch_Duration"
    alias: AlphaESS Update Force Charging Duration
    triggers:
      - trigger: state
        entity_id:
          - input_number.alphaess_helper_dispatch_duration
    conditions:
      - condition: state
        entity_id: input_boolean.alphaess_helper_dispatch
        state: "on"
    actions:
      - action: modbus.write_register
        data:
          hub: modbuspvsystem
          address: 0x0887 # Dispatch Time
          slave: !secret alphaess_modbus_slaveId
          value:
            - 0
            - "{{ (states('input_number.alphaess_helper_dispatch_duration')|int) * 60 }}"
      - action: timer.cancel
        data:
          entity_id: timer.alphaess_helper_dispatch_timer
      - action: timer.start
        data:
          entity_id: timer.alphaess_helper_dispatch_timer
          duration: "{{ (states('input_number.alphaess_helper_dispatch_duration')|int) * 60 }}"
    mode: single

# Update Dispatch Power
  - id: "AlphaESS_Update_Dispatch_Power"
    alias: AlphaESS Update Dispatch Power
    triggers:
      - trigger: state
        entity_id:
          - input_number.alphaess_helper_dispatch_power
    conditions:
      - condition: state
        entity_id: input_boolean.alphaess_helper_dispatch
        state: "on"
      - condition: or
        conditions:
          - condition: state
            entity_id: input_select.alphaess_helper_dispatch_mode
            state: "Battery only Charges from PV (1)"
          - condition: state
            entity_id: input_select.alphaess_helper_dispatch_mode
            state: "State of Charge Control (2)"
          - condition: state
            entity_id: input_select.alphaess_helper_dispatch_mode
            state: "Load Following (3)"
          - condition: state
            entity_id: input_select.alphaess_helper_dispatch_mode
            state: "Normal Mode (5)"
    actions:
      - action: modbus.write_register
        data:
          hub: modbuspvsystem
          address: 0x0881 # Dispatch Active Power, 32000 Offset
          slave: !secret alphaess_modbus_slaveId
          value:
            - 0
            - "{{ 32000 + ((states('input_number.alphaess_helper_dispatch_power')|float * 1000)|int) }}"
    mode: single
# --- End Dispatch automations

#-------------------------------------------------------------------------------------------------------------------------------#
#-------------------------------------------------------------------------------------------------------------------------------#
#-------------------------------------------------------------------------------------------------------------------------------#

# Set Excess_Export, here:
#   - Power:
#       If PV Output > Inverter Limit + PV_AC:
#         Charge Battery with Excess - which directs the remainder to House Load and Feed-in
#       Else:
#         Charge Battery with Zero - which directs all PV Output to House Load and Feed-in
#   - Cutoff SoC = 100%
#   - Duration = 5min
  - id: "AlphaESS_Excess_Export"
    alias: AlphaESS Excess Export
    triggers:
      - trigger: state
        entity_id:
          - sensor.alphaess_current_pv_production
    conditions:
      - condition: state
        entity_id: input_boolean.alphaess_helper_excess_export
        state: "on"
      - condition: state
        entity_id: input_boolean.alphaess_helper_excess_export_pause
        state: "off"
    actions:
      - if:
          - condition: or
            conditions:
              - condition: state
                entity_id: input_boolean.alphaess_helper_force_charging
                state: "on"
              - condition: state
                entity_id: input_boolean.alphaess_helper_force_discharging
                state: "on"
              - condition: state
                entity_id: input_boolean.alphaess_helper_force_export
                state: "on"
              - condition: state
                entity_id: input_boolean.alphaess_helper_dispatch
                state: "on"
              - condition: state
                entity_id: input_boolean.alphaess_helper_excess_export
                state: "on"
                enabled: false
        then:
          - entity_id: input_boolean.alphaess_helper_force_charging
            action: input_boolean.turn_off
          - entity_id: input_boolean.alphaess_helper_force_discharging
            action: input_boolean.turn_off
          - entity_id: input_boolean.alphaess_helper_force_export
            action: input_boolean.turn_off
          - entity_id: input_boolean.alphaess_helper_dispatch
            action: input_boolean.turn_off
          - entity_id: input_boolean.alphaess_helper_excess_export
            action: input_boolean.turn_off
            enabled: false
          - if:
              - condition: state
                entity_id: input_boolean.alphaess_helper_excess_export
                state: "off"
            then:
              - action: input_boolean.turn_off
                target:
                  entity_id: input_boolean.alphaess_helper_excess_export_pause
                data: {}
          - data:
              entity_id: timer.alphaess_helper_force_charging_timer
            action: timer.cancel
          - data:
              entity_id: timer.alphaess_helper_force_discharging_timer
            action: timer.cancel
          - data:
              entity_id: timer.alphaess_helper_dispatch_timer
            action: timer.cancel
          - delay:
              seconds: 2
      - action: modbus.write_register
        data:
          hub: modbuspvsystem
          address: 0x0880 # Dispatch Starting Register
          slave: !secret alphaess_modbus_slaveId
          value:
            - 1   # Dispatch Start
            - 0   # Dispatch Active Power, 32000 Offset (2 bytes/registers)
            - >
              {% if states('sensor.alphaess_current_pv_production')|int > (states('input_select.alphaess_helper_inverter_ac_limit').replace(' kW','')|float * 1000)|int + states('sensor.alphaess_active_power_pv_meter')|int %}
                {{ 32000 - (states('sensor.alphaess_current_pv_production')|int - (states('input_select.alphaess_helper_inverter_ac_limit').replace(' kW','')|float * 1000)|int - states('sensor.alphaess_active_power_pv_meter')|int) }}
              {% else %}
                32000
              {% endif %}
            - 0   # Dispatch Reactive Power, 32000 Offset (2 bytes/registers)
            - 32000
            - 2   # Dispatch Mode (2 = State of Charge Control)
            - 255 # Dispatch SOC  (0.392%/bit)
            - 0   # Dispatch Time (2 bytes/registers)
            - 300 # 5 min
    mode: single
    max_exceeded: silent

# Pause Excess_Export
  - id: "AlphaESS_Excess_Export_Pause"
    alias: AlphaESS Excess Export Pause
    triggers:
      - trigger: state
        entity_id:
          - sensor.alphaess_power_grid
      - trigger: state
        entity_id:
          - sensor.alphaess_inverter_work_mode
    conditions:
      - condition: state
        entity_id: input_boolean.alphaess_helper_excess_export
        state: "on"
      - condition: or
        conditions:
          - condition: and
            conditions:
              - condition: numeric_state
                entity_id: sensor.alphaess_power_grid
                above: 50
              - condition: template
                value_template: >-
                  {{now() >
                  state_attr('automation.alphaess_excess_export_resume','last_triggered') | default(as_datetime(0), true)
                  + timedelta(seconds=15)}}
          - condition: not
            conditions:
              - condition: state
                entity_id: sensor.alphaess_inverter_work_mode
                state: "1"
    actions:
      - action: input_boolean.turn_on
        entity_id: input_boolean.alphaess_helper_excess_export_pause
      - action: modbus.write_register
        data:
          hub: modbuspvsystem
          address: 0x0880 # Dispatch Starting Register
          slave: !secret alphaess_modbus_slaveId
          value:
            - 0   # Dispatch Start
            - 0   # Dispatch Active Power, 32000 Offset (2 bytes/registers)
            - 32000
            - 0   # Dispatch Reactive Power, 32000 Offset (2 bytes/registers)
            - 32000
            - 0   # Dispatch Mode (2 = State of Charge Control)
            - 0   # Dispatch SOC  (0.392%/bit)
            - 0   # Dispatch Time (2 bytes/registers)
            - 90
    mode: single
    max_exceeded: silent

# Resume Excess_Export
  - id: "AlphaESS_Excess_Export_Resume"
    alias: AlphaESS Excess Export Resume
    triggers:
      - trigger: time_pattern
        seconds: /5
    conditions:
      - condition: state
        entity_id: input_boolean.alphaess_helper_excess_export
        state: "on"
      - condition: state
        entity_id: input_boolean.alphaess_helper_excess_export_pause
        state: "on"
      - condition: numeric_state
        entity_id: sensor.alphaess_current_pv_production
        above: 100
      - condition: template
        value_template: >-
          {{now() >
          state_attr('automation.alphaess_excess_export_pause','last_triggered') | default(as_datetime(0), true)
          + timedelta(seconds=15)}}
      - condition: state
        entity_id: sensor.alphaess_inverter_work_mode
        state: "1"
        for:
          hours: 0
          minutes: 10
          seconds: 0
      - condition: or
        conditions:
          - condition: numeric_state
            entity_id: sensor.alphaess_excess_power
            above: 50
          - condition: numeric_state
            entity_id: sensor.alphaess_power_grid
            below: -500
    actions:
      - action: input_boolean.turn_off
        entity_id: input_boolean.alphaess_helper_excess_export_pause
    mode: single

#-------------------------------------------------------------------------------------------------------------------------------#
#-------------------------------------------------------------------------------------------------------------------------------#
#-------------------------------------------------------------------------------------------------------------------------------#

# Reset Dispatch Registers
  - id: "AlphaESS_Dispatch_Reset"
    alias: AlphaESS Dispatch Reset
    triggers:
      - trigger: state
        entity_id:
          - input_boolean.alphaess_helper_force_charging
        to: "off"
      - trigger: state
        entity_id:
          - input_boolean.alphaess_helper_force_discharging
        to: "off"
      - trigger: state
        entity_id:
          - input_boolean.alphaess_helper_force_export
        to: "off"
      - trigger: state
        entity_id:
          - input_boolean.alphaess_helper_dispatch
        to: "off"
      - trigger: state
        entity_id:
          - input_boolean.alphaess_helper_excess_export
        to: "off"
      - trigger: event
        event_type: timer.finished
        event_data:
          entity_id: timer.alphaess_helper_force_charging_timer
        enabled: false
      - trigger: event
        event_type: timer.finished
        event_data:
          entity_id: timer.alphaess_helper_force_discharging_timer
        enabled: false
      - trigger: event
        event_type: timer.finished
        event_data:
          entity_id: timer.alphaess_helper_force_export_timer
        enabled: false
      - trigger: event
        event_type: timer.finished
        event_data:
          entity_id: timer.alphaess_helper_dispatch_timer
        enabled: false
    actions:
      - action: modbus.write_register
        data:
          hub: modbuspvsystem
          address: 0x0880 # Dispatch Starting Register
          slave: !secret alphaess_modbus_slaveId
          value:
            - 0   # Dispatch Start
            - 0   # Dispatch Active Power, 32000 Offset (2 bytes/registers)
            - 32000
            - 0   # Dispatch Reactive Power, 32000 Offset (2 bytes/registers)
            - 32000
            - 0   # Dispatch Mode (2 = State of Charge Control)
            - 0   # Dispatch SOC  (0.392%/bit)
            - 0   # Dispatch Time (2 bytes/registers)
            - 90
      - if:
          - condition: state
            entity_id: input_boolean.alphaess_helper_excess_export
            state: "off"
        then:
          - action: input_boolean.turn_off
            target:
              entity_id: input_boolean.alphaess_helper_excess_export_pause
      - action: timer.cancel
        data:
          entity_id: timer.alphaess_helper_force_charging_timer
      - action: timer.cancel
        data:
          entity_id: timer.alphaess_helper_force_discharging_timer
      - action: timer.cancel
        data:
          entity_id: timer.alphaess_helper_force_export_timer
      - action: timer.cancel
        data:
          entity_id: timer.alphaess_helper_dispatch_timer
    mode: single
    max_exceeded: silent

# Reset Dispatch Full
  - id: "AlphaESS_Dispatch_Reset_Full"
    alias: AlphaESS Dispatch Reset Full
    triggers:
      - trigger: homeassistant
        event: start
      - trigger: state
        entity_id: sensor.alphaess_power_grid
        to:
          - "unknown"
          - "unavailable"
      - trigger: state
        entity_id:
          - input_button.alphaess_helper_dispatch_reset_full
      - trigger: event
        event_type: timer.finished
        event_data:
          entity_id: timer.alphaess_helper_force_charging_timer
      - trigger: event
        event_type: timer.finished
        event_data:
          entity_id: timer.alphaess_helper_force_discharging_timer
      - trigger: event
        event_type: timer.finished
        event_data:
          entity_id: timer.alphaess_helper_force_export_timer
      - trigger: event
        event_type: timer.finished
        event_data:
          entity_id: timer.alphaess_helper_dispatch_timer
    actions:
      - action: modbus.write_register
        data:
          hub: modbuspvsystem
          address: 0x0880 # Dispatch Starting Register
          slave: !secret alphaess_modbus_slaveId
          value:
            - 0   # Dispatch Start
            - 0   # Dispatch Active Power, 32000 Offset (2 bytes/registers)
            - 32000
            - 0   # Dispatch Reactive Power, 32000 Offset (2 bytes/registers)
            - 32000
            - 0   # Dispatch Mode (2 = State of Charge Control)
            - 0   # Dispatch SOC  (0.392%/bit)
            - 0   # Dispatch Time (2 bytes/registers)
            - 90
      - action: input_boolean.turn_off
        entity_id: input_boolean.alphaess_helper_force_charging
      - action: input_boolean.turn_off
        entity_id: input_boolean.alphaess_helper_force_discharging
      - action: input_boolean.turn_off
        entity_id: input_boolean.alphaess_helper_force_export
      - action: input_boolean.turn_off
        entity_id: input_boolean.alphaess_helper_dispatch
      - action: input_boolean.turn_off
        entity_id: input_boolean.alphaess_helper_excess_export
      - if:
          - condition: state
            entity_id: input_boolean.alphaess_helper_excess_export
            state: "off"
        then:
          - action: input_boolean.turn_off
            target:
              entity_id: input_boolean.alphaess_helper_excess_export_pause
      - action: timer.cancel
        data:
          entity_id: timer.alphaess_helper_force_charging_timer
      - action: timer.cancel
        data:
          entity_id: timer.alphaess_helper_force_discharging_timer
      - action: timer.cancel
        data:
          entity_id: timer.alphaess_helper_force_export_timer
      - action: timer.cancel
        data:
          entity_id: timer.alphaess_helper_dispatch_timer
    mode: single

