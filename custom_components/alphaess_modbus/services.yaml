force_charge:
  name: Force charge
  description: Start force charging using Dispatch Mode 2.
  fields:
    entry_id:
      required: false
      example: "abc123"
      selector:
        text:
    power_kw:
      required: false
      default: 5
      selector:
        number:
          min: 0
          max: 20
          step: 0.1
          unit_of_measurement: kW
    duration_min:
      required: false
      default: 120
      selector:
        number:
          min: 0
          max: 480
          step: 5
          unit_of_measurement: min
    cutoff_soc:
      required: false
      default: 100
      selector:
        number:
          min: 4
          max: 100
          step: 1
          unit_of_measurement: "%"

force_discharge:
  name: Force discharge
  description: Start force discharging using Dispatch Mode 2.
  fields:
    entry_id:
      required: false
      selector:
        text:
    power_kw:
      required: false
      default: 5
      selector:
        number:
          min: 0
          max: 20
          step: 0.1
          unit_of_measurement: kW
    duration_min:
