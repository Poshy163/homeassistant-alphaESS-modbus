      default: 120
      selector:
        number:
          min: 0
          max: 480
          step: 5
          unit_of_measurement: min
    cutoff_soc:
      required: false
      default: 10
      selector:
        number:
          min: 4
          max: 100
          step: 1
          unit_of_measurement: "%"

force_export:
  name: Force export
  description: Start force export behavior (currently mapped to force discharge core path).
  fields:
    entry_id:
      required: false
      selector:
        text:
    power_kw:
      required: false
      default: 5
      selector:
        number:
          min: 0
          max: 20
