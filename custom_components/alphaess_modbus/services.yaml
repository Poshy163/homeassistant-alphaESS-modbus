dispatch:
  name: Dispatch
  description: Execute generic dispatch write sequence.
  fields:
    entry_id:
      required: false
      selector:
        text:
    mode:
      required: false
      default: 2
      selector:
        number:
          min: 1
          max: 19
          step: 1
    power_kw:
      required: false
      default: 0
      selector:
        number:
          min: -20
          max: 20
          step: 0.1
          unit_of_measurement: kW
    duration_min:
      required: false
      default: 120
      selector:
        number:
          min: 0
          max: 480
          step: 5
          unit_of_measurement: min
    cutoff_soc:
      required: false
      default: 100
      selector:
        number:
          min: 4
          max: 100
          step: 1
          unit_of_measurement: "%"

dispatch_reset:
  name: Dispatch reset
  description: Reset all dispatch registers to defaults.
  fields:
    entry_id:
      required: false
      selector:
        text:

sync_datetime:
  name: Synchronise date and time
  description: Write Home Assistant local date/time to inverter registers.
  fields:
